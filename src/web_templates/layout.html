<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} — nocturnal</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <script src="/static/js/htmx.min.js"></script>
    <script>
        (function() {
            var t = localStorage.getItem("theme");
            if (t === "light" || t === "dark") {
                document.documentElement.setAttribute("data-theme", t);
            }
        })();
    </script>
</head>
<body>
    <a href="#main-content" class="sr-only">Skip to main content</a>
    <header>
        <nav aria-label="Breadcrumb">
            <a href="/">nocturnal</a>
            {% for crumb in breadcrumbs %}
            <span class="separator">/</span>
            {% if let Some(url) = crumb.url %}
            <a href="{{ url }}">{{ crumb.label }}</a>
            {% else %}
            <span>{{ crumb.label }}</span>
            {% endif %}
            {% endfor %}
            <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle theme">
                <svg id="theme-icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                <svg id="theme-icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                <svg id="theme-icon-system" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
            </button>
        </nav>
    </header>
    <main id="main-content">
        {% block content %}{% endblock %}
    </main>
    <script>
        document.addEventListener("click", function(e) {
            var el = e.target.closest("[data-href]");
            if (el) { window.location.href = el.dataset.href; }
        });
        document.addEventListener("keydown", function(e) {
            if (e.key === "Enter" || e.key === " ") {
                var el = e.target.closest("[data-href]");
                if (el) {
                    if (e.key === " ") { e.preventDefault(); }
                    window.location.href = el.dataset.href;
                }
            }
        });
        (function() {
            var modes = ["system", "light", "dark"];
            var labels = { system: "System theme", light: "Light theme", dark: "Dark theme" };
            var iconSun = document.getElementById("theme-icon-sun");
            var iconMoon = document.getElementById("theme-icon-moon");
            var iconSystem = document.getElementById("theme-icon-system");
            var btn = document.getElementById("theme-toggle");

            function current() {
                return localStorage.getItem("theme") || "system";
            }

            function apply(mode) {
                if (mode === "light" || mode === "dark") {
                    document.documentElement.setAttribute("data-theme", mode);
                } else {
                    document.documentElement.removeAttribute("data-theme");
                }
                localStorage.setItem("theme", mode);
                iconSun.style.display = mode === "light" ? "block" : "none";
                iconMoon.style.display = mode === "dark" ? "block" : "none";
                iconSystem.style.display = mode === "system" ? "block" : "none";
                btn.setAttribute("aria-label", labels[mode]);
            }

            apply(current());

            btn.addEventListener("click", function() {
                var i = modes.indexOf(current());
                apply(modes[(i + 1) % modes.length]);
            });
        })();
    </script>
</body>
</html>
