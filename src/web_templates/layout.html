<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} — nocturnal</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
    <script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
    <script>
        (function() {
            var t = localStorage.getItem("theme");
            if (t === "light" || t === "dark") {
                document.documentElement.setAttribute("data-theme", t);
            } else if (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) {
                document.documentElement.setAttribute("data-theme", "light");
            }
        })();
    </script>
</head>
<body>
    <a href="#main-content" class="sr-only">Skip to main content</a>
    <header>
        <nav aria-label="Breadcrumb">
            <a href="/">nocturnal</a>
            {% for crumb in breadcrumbs %}
            <span class="separator">/</span>
            {% if let Some(url) = crumb.url %}
            <a href="{{ url }}">{{ crumb.label }}</a>
            {% else %}
            <span>{{ crumb.label }}</span>
            {% endif %}
            {% endfor %}
            <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle theme">
                <i data-lucide="sun" id="theme-icon-sun"></i>
                <i data-lucide="moon" id="theme-icon-moon"></i>
                <i data-lucide="monitor" id="theme-icon-system"></i>
            </button>
        </nav>
    </header>
    <main id="main-content">
        {% block content %}{% endblock %}
    </main>
    <script>
        document.addEventListener("click", function(e) {
            var el = e.target.closest("[data-href]");
            if (el) { window.location.href = el.dataset.href; }
        });
        document.addEventListener("keydown", function(e) {
            if (e.key === "Enter" || e.key === " ") {
                var el = e.target.closest("[data-href]");
                if (el) {
                    if (e.key === " ") { e.preventDefault(); }
                    window.location.href = el.dataset.href;
                }
            }
        });
        lucide.createIcons();
        (function() {
            var modes = ["system", "light", "dark"];
            var labels = { system: "System theme", light: "Light theme", dark: "Dark theme" };
            var iconSun = document.getElementById("theme-icon-sun");
            var iconMoon = document.getElementById("theme-icon-moon");
            var iconSystem = document.getElementById("theme-icon-system");
            var btn = document.getElementById("theme-toggle");
            var mq = window.matchMedia && window.matchMedia("(prefers-color-scheme: light)");
            var mqListener = null;

            function current() {
                return localStorage.getItem("theme") || "system";
            }

            function applySystemTheme() {
                if (mq && mq.matches) {
                    document.documentElement.setAttribute("data-theme", "light");
                } else {
                    document.documentElement.removeAttribute("data-theme");
                }
            }

            function apply(mode) {
                if (mode === "light" || mode === "dark") {
                    document.documentElement.setAttribute("data-theme", mode);
                } else {
                    applySystemTheme();
                }
                if (mode === "system" && mq && !mqListener) {
                    mqListener = function() { applySystemTheme(); };
                    mq.addEventListener("change", mqListener);
                } else if (mode !== "system" && mqListener) {
                    mq.removeEventListener("change", mqListener);
                    mqListener = null;
                }
                localStorage.setItem("theme", mode);
                iconSun.style.display = mode === "light" ? "block" : "none";
                iconMoon.style.display = mode === "dark" ? "block" : "none";
                iconSystem.style.display = mode === "system" ? "block" : "none";
                btn.setAttribute("aria-label", labels[mode]);
            }

            apply(current());

            btn.addEventListener("click", function() {
                var i = modes.indexOf(current());
                apply(modes[(i + 1) % modes.length]);
            });
        })();
    </script>
</body>
</html>
