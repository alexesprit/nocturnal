{% extends "layout.html" %}

{% block content %}
<div class="project-header">
    <div class="rotate-controls">
        <button class="btn-rotate"
                hx-post="/api/projects/{{ name }}/develop"
                hx-target="#develop-feedback"
                hx-swap="innerHTML">Develop now</button>
        <span id="develop-feedback"></span>
    </div>
</div>
{% include "partials/filters.html" %}
<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Status</th>
            <th>Priority</th>
            <th>Type</th>
            <th>Labels</th>
            <th>Updated</th>
        </tr>
    </thead>
    <tbody id="issue-table-body">
        {% include "partials/issue_table.html" %}
    </tbody>
</table>
{% endblock %}
