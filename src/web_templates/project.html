{% extends "layout.html" %}

{% block content %}
<div class="project-header">
    <div class="rotate-controls">
        <button class="btn-rotate"
                hx-post="/api/projects/{{ name }}/develop"
                hx-target="#develop-feedback"
                hx-swap="innerHTML">Develop now</button>
        <span id="develop-feedback"></span>
    </div>
</div>
{% include "partials/filters.html" %}
<div id="content-panel">
{% if view == "kanban" %}
{% include "partials/kanban_board.html" %}
{% else %}
{% include "partials/table_wrapper.html" %}
{% endif %}
</div>
{% endblock %}
